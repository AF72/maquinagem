<!doctype html>
<html lang="pt">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MaquinaGest — Gestão de Produção</title>
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/layout.css" />
        <link rel="stylesheet" href="css/components.css" />
        <link rel="stylesheet" href="css/modal.css" />
    </head>
    <body>
        <div class="app">
            <!-- SIDEBAR -->
            <aside class="sidebar">
                <div class="logo">
                    <div class="logo-title">
                        <img class="logo-img" src="./images/LOGO COR_A.png" />
                    </div>
                    <div class="logo-sub">Gestão de Produção</div>
                </div>
                <nav>
                    <div class="nav-item active" data-page="dashboard">
                        <svg
                            class="nav-icon"
                            viewBox="0 0 16 16"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                        >
                            <rect x="1" y="1" width="6" height="6" rx="1" />
                            <rect x="9" y="1" width="6" height="6" rx="1" />
                            <rect x="1" y="9" width="6" height="6" rx="1" />
                            <rect x="9" y="9" width="6" height="6" rx="1" />
                        </svg>
                        Dashboard
                    </div>
                    <div class="nav-item" data-page="clientes">
                        <svg
                            class="nav-icon"
                            viewBox="0 0 16 16"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                        >
                            <circle cx="6" cy="5" r="3" />
                            <path d="M1 14c0-2.8 2.2-5 5-5" />
                            <circle cx="12" cy="10" r="3.5" />
                            <path d="M12 8.5v3M10.5 10h3" />
                        </svg>
                        Clientes
                    </div>
                    <div class="nav-item" data-page="pedidos">
                        <svg
                            class="nav-icon"
                            viewBox="0 0 16 16"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                        >
                            <path d="M3 2h10l1 3H2L3 2z" />
                            <rect x="1" y="5" width="14" height="9" rx="1" />
                            <path d="M6 9h4M6 12h2" />
                        </svg>
                        Pedidos
                    </div>
                    <div class="nav-item" data-page="ordens">
                        <svg
                            class="nav-icon"
                            viewBox="0 0 16 16"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                        >
                            <rect x="1" y="1" width="14" height="14" rx="1.5" />
                            <path d="M4 5h8M4 8h8M4 11h5" />
                        </svg>
                        Ordens de Trabalho
                    </div>
                    <div class="nav-item" data-page="pecas">
                        <svg
                            class="nav-icon"
                            viewBox="0 0 16 16"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                        >
                            <polygon points="8,1 15,5 15,11 8,15 1,11 1,5" />
                            <circle cx="8" cy="8" r="2.5" />
                        </svg>
                        Peças
                    </div>
                    <div class="nav-item" data-page="custos">
                        <svg
                            class="nav-icon"
                            viewBox="0 0 16 16"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                        >
                            <circle cx="8" cy="8" r="7" />
                            <path
                                d="M8 4v1.5M8 10.5V12M5.5 6.5C5.5 5.7 6.6 5 8 5s2.5.7 2.5 1.5S9.4 8 8 8s-2.5.7-2.5 1.5S6.6 11 8 11s2.5-.7 2.5-1.5"
                            />
                        </svg>
                        Custos
                    </div>
                </nav>
            </aside>

            <!-- MAIN -->
            <div class="main">
                <header class="topbar">
                    <span class="topbar-title" id="page-title">Dashboard</span>
                </header>

                <div class="content">
                    <div id="page-dashboard" class="page active"></div>
                    <div id="page-clientes" class="page"></div>
                    <div id="page-pedidos" class="page"></div>
                    <div id="page-ordens" class="page"></div>
                    <div id="page-pecas" class="page"></div>
                    <div id="page-custos" class="page"></div>
                </div>
            </div>
        </div>

        <!-- MODAL -->
        <div class="modal-wrap" id="modal-wrap">
            <div class="modal">
                <div class="modal-title" id="modal-title"></div>
                <div id="modal-body"></div>
            </div>
        </div>

        <!-- Chart.js CDN -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

        <!-- App modules -->
        <script src="js/data.js"></script>
        <script src="js/helpers.js"></script>
        <script src="js/modal.js"></script>
        <script src="js/pages/dashboard.js"></script>
        <script src="js/pages/clientes.js"></script>
        <script src="js/pages/pedidos.js"></script>
        <script src="js/pages/ordens.js"></script>
        <script src="js/pages/pecas.js"></script>
        <script src="js/pages/custos.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
