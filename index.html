<!doctype html>
<html lang="pt">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MaquinaGest — Gestão de Produção</title>
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/layout.css" />
        <link rel="stylesheet" href="css/components.css" />
        <link rel="stylesheet" href="css/modal.css" />
        <style>
            /* Ecrã de login */
            #login-screen {
                display: none;
                position: fixed;
                inset: 0;
                background: var(--color-bg, #f5f5f5);
                z-index: 1000;
                align-items: center;
                justify-content: center;
            }
            .login-card {
                background: var(--color-surface, #fff);
                border-radius: var(--radius-lg, 12px);
                box-shadow: 0 8px 32px rgba(0,0,0,.12);
                padding: 2.5rem 2rem;
                width: 100%;
                max-width: 380px;
            }
            .login-card h1 {
                font-size: 22px;
                font-weight: 700;
                margin: 0 0 .25rem;
                color: var(--color-text);
            }
            .login-card .login-sub {
                font-size: 13px;
                color: var(--color-text-muted);
                margin-bottom: 1.75rem;
            }
            .login-erro {
                font-size: 13px;
                color: var(--color-danger, #e53e3e);
                margin-bottom: .75rem;
                min-height: 1.2em;
            }
            /* Botão de logout na sidebar */
            .sidebar-logout {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: .5rem 1rem;
                margin: .25rem .5rem 0;
                border-radius: var(--radius-md, 8px);
                font-size: 13px;
                color: var(--color-text-muted);
                cursor: pointer;
                border: none;
                background: none;
                width: calc(100% - 1rem);
                text-align: left;
            }
            .sidebar-logout:hover { background: var(--color-hover); color: var(--color-danger, #e53e3e); }
            .sidebar-user {
                padding: .4rem 1rem .1rem;
                font-size: 12px;
                font-weight: 600;
                color: var(--color-text);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .sidebar-user-role {
                padding: 0 1rem .5rem;
                font-size: 11px;
                color: var(--color-text-muted);
                text-transform: capitalize;
            }
        </style>
    </head>
    <body>
        <!-- ECRÃ DE LOGIN -->
        <div id="login-screen" style="display:flex;">
            <div class="login-card">
                <div style="text-align:center; margin-bottom:1.25rem;">
                    <img src="./images/LOGO COR_A.png" alt="MaquinaGest" style="height:7rem; object-fit:contain;" />
                </div>
                <h1 style="text-align:center;">MaquinaGest</h1>
                <p class="login-sub" style="text-align:center;">Gestão de Produção</p>
                <form onsubmit="submitLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input id="login-email" type="email" autocomplete="email" placeholder="utilizador@empresa.pt" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••" required />
                    </div>
                    <div id="login-erro" class="login-erro"></div>
                    <button id="login-btn" type="submit" class="btn btn-primary" style="width:100%;">Entrar</button>
                </form>
            </div>
        </div>

        <!-- APP PRINCIPAL -->
        <div id="app-wrapper" style="display:none;">
        <div class="app">
            <!-- SIDEBAR -->

                <div class="logo">
                    <div class="logo-title">
                        <img class="logo-img" src="./images/LOGO COR_A.png" />
                    </div>
                    <div class="logo-sub">Gestão de Produção</div>
                </div>
                <nav>
                    <div class="nav-item active" data-page="dashboard">
                        <svg
                            class="nav-icon"
                            viewBox="0 0 16 16"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                        >
                            <rect
                                x="1"
                                y="1"
                                width="6"
                                height="6"
                                rx="1"
                                fill="orange"
                            />
                            <rect x="9" y="1" width="6" height="6" rx="1" />
                            <rect x="1" y="9" width="6" height="6" rx="1" />
                            <rect
                                x="9"
                                y="9"
                                width="6"
                                height="6"
                                rx="1"
                                fill="orange"
                            />
                        </svg>
                        Dashboard
                    </div>
                    <div class="nav-item" data-page="clientes">
                        <svg
                            class="nav-icon"
                            viewBox="0 0 16 16"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"

                            <circle cx="6" cy="5" r="3" />

                    <div class="nav-item" data-page="pedidos">
                        <svg

                            viewBox="0 0 16 16"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"

                            <rect x="1" y="5" width="14" height="9" rx="1" />
                            <path d="M6 9h4M6 12h2" />
                        </svg>
                        Pedidos
                    </div>
                    <div class="nav-item" data-page="orcamentos">

                            fill="none"

                            <rect x="1" y="1" width="14" height="14" rx="1" />

                    </div>
                    <div class="nav-item" data-page="ordens">

                            class="nav-icon"

                            fill="none"
                            stroke="currentColor"

                            />

                    </div>
                    <div class="nav-item" data-page="fornecedores">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">

                    <!-- Grupo Configurações -->
                    <div class="nav-group-header" id="nav-group-config-header" onclick="toggleNavGroup('config')">
                        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="8" cy="8" r="2.5"/>

                        </svg>
                        Configurações
                        <svg class="nav-group-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 4l4 4-4 4"/>
                        </svg>
                    </div>
                    <div class="nav-group-items" id="nav-group-config">
                        <div class="nav-item nav-sub-item" data-page="colaboradores_dm">
                            <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="5" cy="5" r="2.5"/>

                                <circle cx="12" cy="5" r="2.5"/>
                                <path d="M10 13c0-2.2 1.8-4 4-4"/>
                            </svg>
                            Colaboradores DM
                        </div>
                        <div class="nav-item nav-sub-item" data-page="materia_prima">
                            <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">

                            Matéria Prima
                        </div>

                                <circle cx="8" cy="8" r="3"/>

                <!-- Utilizador logado + logout -->

                    <div id="sidebar-clock" style="padding:.75rem 1rem .25rem; font-size:12px; color:var(--color-text-muted); line-height:1.6; text-align:center;">
                        <div id="clock-time" style="font-size:20px; font-weight:600; color:var(--color-text); letter-spacing:1px;"></div>
                        <div id="clock-date" style="font-size:17px; text-transform:capitalize;"></div>
                    </div>
                    <div id="sidebar-user-nome" class="sidebar-user"></div>

                            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l3-3-3-3M13 8H6"/>
                        </svg>
                        Terminar sessão
                    </button>
                    <div style="padding:.5rem 1rem; font-size:11px; color:var(--color-text-muted); text-align:center; cursor:pointer;" onclick="abrirModalAlterarPassword(false)" title="Alterar password">
                        Alterar password
                    </div>
                </div>

            <!-- MAIN -->
            <div class="main">
                <header class="topbar">
                    <div class="topbar-brand">
                        <span class="topbar-logo" id="page-logo"></span>

                    </div>
                </header>

                <div class="content">
                    <div id="page-dashboard" class="page active"></div>
                    <div id="page-clientes" class="page"></div>
                    <div id="page-pedidos" class="page"></div>
                    <div id="page-pedido_detalhe" class="page"></div>
                    <div id="page-orcamentos" class="page"></div>
                    <div id="page-orcamento_detalhe" class="page"></div>
                    <div id="page-ordens" class="page"></div>
                    <div id="page-ordem_detalhe" class="page"></div>

                    <div id="page-custos" class="page"></div>
                    <div id="page-materia_prima" class="page"></div>

                    <div id="page-colaboradores_dm" class="page"></div>
                    <div id="page-fornecedores" class="page"></div>
                    <div id="page-processos" class="page"></div>
                </div>
            </div>
        </div>
        </div><!-- /app-wrapper -->

        <!-- MODAL principal -->
        <div class="modal-wrap" id="modal-wrap">
            <div class="modal">
                <div class="modal-title" id="modal-title"></div>
                <div id="modal-body"></div>
            </div>
        </div>

        <!-- MODAL: alterar password -->
        <div id="alterar-password-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:500; align-items:center; justify-content:center;">
            <div style="background:var(--color-surface); border-radius:var(--radius-lg); padding:1.5rem; width:100%; max-width:400px; box-shadow:0 8px 32px rgba(0,0,0,.2);">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                    <h3 style="margin:0; font-size:15px; font-weight:600;">Alterar Password</h3>
                    <button id="ap-cancelar" class="btn btn-ghost" onclick="fecharModalAlterarPassword()">✕</button>
                </div>
                <div class="form-grid" style="grid-template-columns:1fr;">
                    <div class="form-group">
                        <label class="form-label">Password atual</label>
                        <input id="ap-atual" type="password" placeholder="••••••••" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nova password</label>
                        <input id="ap-nova" type="password" placeholder="Mínimo 8 caracteres" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirmar nova password</label>
                        <input id="ap-confirmar" type="password" placeholder="Repita a nova password" />
                    </div>
                </div>
                <div id="ap-erro" style="font-size:13px; color:var(--color-danger,#e53e3e); min-height:1.2em; margin:.5rem 0;"></div>
                <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:.5rem;">
                    <button id="ap-cancelar-btn" class="btn" onclick="fecharModalAlterarPassword()">Cancelar</button>
                    <button id="ap-btn-save" class="btn btn-primary" onclick="submitAlterarPassword()">Guardar</button>
                </div>
            </div>
        </div>

        <!-- Chart.js CDN -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
        <!-- html2pdf CDN -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

        <!-- App modules -->
        <script src="js/auth.js"></script>
        <script src="js/data.js"></script>
        <script src="js/helpers.js"></script>
        <script src="js/modal.js"></script>
        <script src="js/pages/dashboard.js"></script>
        <script src="js/pages/clientes.js"></script>
        <script src="js/pages/pedidos.js"></script>
        <script src="js/pages/orcamentos.js"></script>
        <script src="js/pages/ordens.js"></script>
        <script src="js/pages/pecas.js"></script>
        <script src="js/pages/custos.js"></script>
        <script src="js/pages/materia_prima.js"></script>
        <script src="js/pages/colaboradores_dm.js"></script>
        <script src="js/pages/fornecedores.js"></script>
        <script src="js/pages/processos.js"></script>
        <script src="js/api.js"></script>
        <script src="js/app.js"></script>
        <script>
            (function updateClock() {
                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
                const dd = String(now.getDate()).padStart(2, '0');
                const mes = meses[now.getMonth()];
                const yy = String(now.getFullYear()).slice(-2);
                document.getElementById('clock-time').textContent = hh + ':' + mm;
                document.getElementById('clock-date').textContent = dd + ' ' + mes + ' ' + yy;
                setTimeout(updateClock, 60000 - (now.getSeconds() * 1000 + now.getMilliseconds()));
            })();
        </script>
    </body>
</html>
